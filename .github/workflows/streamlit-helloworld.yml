name: Deploy Streamlit to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ================================
  # 1️⃣ Build & Push Docker Image
  # ================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # for GHCR
      id-token: write   # for Azure OIDC login
    outputs:
      image-sha: ${{ steps.set-image.outputs.image-sha }}

    steps:
      # Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # Login to GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Build Docker image
      - name: Build Docker image
        id: set-image
        run: |
          IMAGE_SHA=${GITHUB_SHA}
          docker build -t ghcr.io/matthewengineering/streamlit-helloworld:latest \
                       -t ghcr.io/matthewengineering/streamlit-helloworld:$IMAGE_SHA .
          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_ENV
          echo "::set-output name=image-sha::$IMAGE_SHA"

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/matthewengineering/streamlit-helloworld:latest
          docker push ghcr.io/matthewengineering/streamlit-helloworld:${{ env.IMAGE_SHA }}

  # ================================
  # 2️⃣ Deploy to Azure Container Apps
  # ================================
  deploy:
    runs-on: ubuntu-latest
    needs: build   # wait for build job
    permissions:
      id-token: write
      contents: read
    steps:
      # Checkout (optional if you need repo context)
      - name: Checkout repo
        uses: actions/checkout@v4

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.STREAMLITHELLOWORLD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STREAMLITHELLOWORLD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STREAMLITHELLOWORLD_AZURE_SUBSCRIPTION_ID }}

      # Deploy to Azure Container Apps
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: streamlit-helloworld
          resourceGroup: myResourceGroup
          imageToDeploy: ghcr.io/matthewengineering/streamlit-helloworld:${{ needs.build.outputs.image-sha }}
          ingress: external
          targetPort: 8501
